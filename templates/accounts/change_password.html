{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Change Password

</h2>

<div class="card shadow p-4">

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Old Password

            </label>

            {{ form.old_password }}

        </div>

        <div class="mb-3">

            <label class="form-label">

                New Password

            </label>

            {{ form.new_password1 }}

        </div>

        <div class="mb-3">

            <label class="form-label">

                Confirm Password

            </label>

            {{ form.new_password2 }}

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Change Password

        </button>

        <a href="/profile/"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
