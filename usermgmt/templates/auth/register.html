{% extends 'base.html' %}
{% block title %} Register {% endblock %}
{% block content %}
<div class="row justify-content-center">
	<div class="col-12 col-lg-8">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4 p-md-5">
				<h1 class="h3 text-center mb-4">Create account</h1>

				<form method="post" action="{% url 'usermgmt:register' %}">
					{% csrf_token %}

					<div class="row">
						<div class="col-md-6 mb-3">
							<label for="first_name" class="form-label">First Name</label>
							<input type="text" id="first_name" name="first_name" class="form-control" required aria-required="true" aria-label="First name" />
						</div>

						<div class="col-md-6 mb-3">
							<label for="last_name" class="form-label">Last Name</label>
							<input type="text" id="last_name" name="last_name" class="form-control" required aria-required="true" aria-label="Last name" />
						</div>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label for="username" class="form-label">Username</label>
							<input type="text" id="username" name="username" class="form-control" required aria-required="true" aria-label="Username" />
						</div>

						<div class="col-md-6 mb-3">
							<label for="email" class="form-label">Email</label>
							<input type="email" id="email" name="email" class="form-control" required aria-required="true" aria-label="Email" />
						</div>
					</div>

					<div class="mb-3">
						<label for="mobile" class="form-label">Mobile Number</label>
						<input type="tel" id="mobile" name="mobile" class="form-control" required aria-required="true" aria-label="Mobile number" />
					</div>

					<div class="mb-3">
						<label for="role" class="form-label">Role</label>
						<select id="role" name="role" class="form-select" required aria-required="true" aria-label="Role">
							<option value="" selected disabled>Select role</option>
							<option value="Admin">Admin</option>
							<option value="Trainer">Trainer</option>
							<option value="Participant">Participant</option>
							<option value="Manager">Manager</option>
							<option value="QA">QA</option>
							<option value="Super Admin">Super Admin</option>
							<option value="System Admin">System Admin</option>
						</select>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label for="password" class="form-label">Password</label>
							<input type="password" id="password" name="password" class="form-control" required aria-required="true" aria-label="Password" />
						</div>

						<div class="col-md-6 mb-3">
							<label for="confirm_password" class="form-label">Confirm Password</label>
							<input type="password" id="confirm_password" name="confirm_password" class="form-control" required aria-required="true" aria-label="Confirm password" />
						</div>
					</div>

					<button type="submit" class="btn btn-primary w-100">Register</button>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
