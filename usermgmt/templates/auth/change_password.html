{% extends 'base.html' %}
{% block title %} Change Password {% endblock %}
{% block content %}
<div class="row justify-content-center">
	<div class="col-12 col-md-8 col-lg-5">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4 p-md-5">
				<h1 class="h3 text-center mb-2">Change password</h1>
				<p class="text-muted text-center mb-4">Use your current password and confirm the new password.</p>

				{% if messages %}
					{% for message in messages %}
						<div class="alert alert-success" role="alert">{{ message }}</div>
					{% endfor %}
				{% endif %}

				<form method="post" action="{% url 'usermgmt:change_password' %}">
					{% csrf_token %}
					<div class="mb-3">
						<label for="current_password" class="form-label">Current Password</label>
						<input type="password" id="current_password" name="current_password" class="form-control" required aria-required="true" aria-label="Current password" />
					</div>

					<div class="mb-3">
						<label for="new_password" class="form-label">New Password</label>
						<input type="password" id="new_password" name="new_password" class="form-control" required aria-required="true" aria-label="New password" />
					</div>

					<div class="mb-4">
						<label for="confirm_password" class="form-label">Confirm Password</label>
						<input type="password" id="confirm_password" name="confirm_password" class="form-control" required aria-required="true" aria-label="Confirm password" />
					</div>

					<button type="submit" class="btn btn-primary w-100">Update password</button>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
