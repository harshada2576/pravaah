{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Edit Profile

</h2>

<div class="card shadow p-4">

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                First Name

            </label>

            {{ form.first_name }}

        </div>

        <div class="mb-3">

            <label class="form-label">
                Last Name
            </label>
            {{ form.last_name }}
        </div>
        <div class="mb-3">
            <label class="form-label">
                Email
            </label>
            {{ form.email }}
        </div>
        <div class="mb-3">
            <label class="form-label">
                Mobile
            </label>
            {{ form.mobile }}
        </div>
        <button
            type="submit"
            class="btn btn-primary">

            Save Changes

        </button>

        <a href="/profile/"
           class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
