{% extends 'base.html' %}

{% block content %}
<div class="container my-4" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-header bg-light">
            <h5 class="mb-0">Configure Granular Policy Rules Override</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="roleTarget" class="form-label fw-bold small">Selected Authority Context</label>
                    <select class="form-select" id="roleTarget">
                        <option value="trainer">Trainer Operator Profile</option>
                        <option value="participant">Participant User Profile</option>
                    </select>
                </div>

                <div class="border rounded p-3 bg-light-subtle">
                    <h6 class="fw-bold mb-3 small text-uppercase text-secondary">Toggle Active Functional Tokens</h6>
                    
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="perm1" checked>
                        <label class="form-check-label small" for="perm1"><code>usermgmt.can_view_admin_dashboard</code> — View main backend system configurations.</label>
                    </div>

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="perm2">
                        <label class="form-check-label small" for="perm2"><code>coursemgmt.can_modify_course</code> — Structural modifications to training syllabus tracks.</label>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="#" class="btn btn-outline-secondary">Go Back</a>
                    <button type="submit" class="btn btn-primary">Commit Security Policy Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
