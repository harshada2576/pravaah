{% extends 'base.html' %}

{% block content %}
<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Application Roles</h2>
            <p class="text-muted small mb-0">Overview of configured user security authorization groups.</p>
        </div>
        <a href="#" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Create New Role</a>
    </div>

    <div class="table-responsive bg-white border rounded p-3">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 10%">ID</th>
                    <th style="width: 30%">Role Designation</th>
                    <th style="width: 40%">System Identifier String</th>
                    <th style="width: 20%" class="text-end">Operations</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><strong>System Administrator</strong></td>
                    <td><code>role_admin</code></td>
                    <td class="text-end">
                        <a href="#" class="btn btn-sm btn-outline-secondary me-1"><i class="fa-solid fa-pen"></i></a>
                        <a href="#" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></a>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><strong>Participant User</strong></td>
                    <td><code>role_participant</code></td>
                    <td class="text-end">
                        <a href="#" class="btn btn-sm btn-outline-secondary me-1"><i class="fa-solid fa-pen"></i></a>
                        <a href="#" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
